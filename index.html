<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>7 Mistérios da Bíblia que Poucos Conseguem Explicar</title>
  <meta name="description" content="Ebook bíblico sobre Apocalipse, marca da besta, anticristo, anjos caídos, vida após a morte e os sinais da volta de Jesus." />
  <style>
    :root {
      --bg: #0f0c0a;
      --panel: #17120f;
      --panel-2: #211810;
      --text: #f3eadc;
      --muted: #d3c1a8;
      --gold: #c89a44;
      --gold-2: #f0c977;
      --line: rgba(240, 201, 119, 0.16);
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      --radius: 24px;
      --max: 1120px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(200, 154, 68, 0.14), transparent 28%),
        linear-gradient(180deg, #120e0b 0%, #0d0b09 100%);
      color: var(--text);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--gold-2);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.02em;
      backdrop-filter: blur(10px);
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 24px;
      border-radius: 16px;
      font-weight: 700;
      transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
      box-shadow: var(--shadow);
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.96;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
      color: #251809;
    }

    .btn-secondary {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text);
    }

    .hero {
      padding: 72px 0 38px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 36px;
      align-items: center;
    }

    h1, h2, h3 { margin: 0 0 16px; line-height: 1.1; }
    h1 { font-size: clamp(2.2rem, 5vw, 4.5rem); letter-spacing: -0.03em; }
    h2 { font-size: clamp(1.6rem, 2.5vw, 2.4rem); }
    h3 { font-size: 1.15rem; }

    .sub {
      font-size: clamp(1.02rem, 1.7vw, 1.25rem);
      color: var(--muted);
      max-width: 760px;
    }

    .hero-points {
      margin-top: 22px;
      display: grid;
      gap: 12px;
    }

    .point {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      color: var(--muted);
    }

    .point strong { color: var(--text); }

    .cover-card {
      position: relative;
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .cover-card::before {
      content: "";
      position: absolute;
      inset: -20% auto auto -20%;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(240,201,119,0.14), transparent 60%);
      pointer-events: none;
    }

    .cover {
      width: 100%;
      aspect-ratio: 4 / 5.2;
      object-fit: cover;
      border-radius: 18px;
      background: #2a2018;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .section {
      padding: 34px 0;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 26px;
      box-shadow: var(--shadow);
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 22px;
    }

    .card p, .panel p, .faq p, li {
      color: var(--muted);
    }

    ul.clean {
      list-style: none;
      padding: 0;
      margin: 16px 0 0;
      display: grid;
      gap: 12px;
    }

    ul.clean li {
      position: relative;
      padding-left: 28px;
    }

    ul.clean li::before {
      content: "✦";
      position: absolute;
      left: 0;
      top: 0;
      color: var(--gold-2);
    }

    .chapters {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 18px;
    }

    .chapter {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
    }

    .faq-wrap {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .faq {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: rgba(255,255,255,0.02);
    }

    .cta-panel {
      text-align: center;
      padding: 38px 24px;
      background:
        radial-gradient(circle at top, rgba(240,201,119,0.14), transparent 40%),
        linear-gradient(180deg, #1b140f 0%, #130f0c 100%);
    }

    .footer {
      padding: 28px 0 54px;
      color: #b89e78;
      font-size: 14px;
      text-align: center;
    }

    .price {
      display: inline-flex;
      align-items: baseline;
      gap: 10px;
      margin: 8px 0 12px;
    }

    .price strong {
      font-size: clamp(2rem, 4vw, 3rem);
      color: var(--gold-2);
      line-height: 1;
    }

    .small {
      color: #c9b18d;
      font-size: 14px;
    }

    @media (max-width: 920px) {
      .hero-grid,
      .grid-3,
      .chapters {
        grid-template-columns: 1fr;
      }

      .hero {
        padding-top: 44px;
      }
    }
  </style>
</head>

  <script>
    const t = CONTENT[PAGE_LANG] || CONTENT["pt-BR"];
    document.documentElement.lang = PAGE_LANG;
    document.title = t.pageTitle;
    document.querySelector('meta[name="description"]').setAttribute('content', t.metaDescription);

    const map = {
      badge: t.badge,
      heroTitle: t.heroTitle,
      heroSubtitle: t.heroSubtitle,
      p1t: t.point1Title,
      p1d: t.point1Text,
      p2t: t.point2Title,

      benefitA: t.benefitA,
      benefitB: t.benefitB,
      benefitC: t.benefitC,
      benefitD: t.benefitD,

      chapter3: t.chapter3,
      chapter4: t.chapter4,

      chapter6: t.chapter6,

      priceLabel: t.priceLabel,
      priceValue: t.priceValue,

      faqTitle: t.faqTitle,
      faq1Q: t.faq1Q,
      faq1A: t.faq1A,
      faq2Q: t.faq2Q,
      faq2A: t.faq2A,
      faq3Q: t.faq3Q,
      faq3A: t.faq3A,
      finalTitle: t.finalTitle,
      finalText: t.finalText,
      cta4: t.ctaPrimary,
      footer: t.footer
    };

    Object.entries(map).forEach(([id, value]) => {
      const el = document.getElementById(id);
      if (!el) return;
      if (el.tagName === "A") {
        el.textContent = value;
      } else {
        el.textContent = value;
      }
    });

    ["cta1", "cta3", "cta4"].forEach(id => {

      link.href = HOTMART_LINK;
    });
